name: sfeos

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
      - features/**

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      elasticsearch_9_3:
        image: docker.elastic.co/elasticsearch/elasticsearch:9.3.2
        env:
          cluster.name: stac-cluster
          node.name: es01
          network.host: 0.0.0.0
          transport.host: 0.0.0.0
          discovery.type: single-node
          http.port: 9200
          xpack.license.self_generated.type: basic
          xpack.security.enabled: false
          xpack.security.transport.ssl.enabled: false
          ES_JAVA_OPTS: -Xms512m -Xmx1g
          action.destructive_requires_name: false
        ports:
          - 9200:9200

      opensearch_3_5:
        image: opensearchproject/opensearch:3.5.0
        env:
          cluster.name: stac-cluster
          node.name: os01
          network.host: 0.0.0.0
          transport.host: 0.0.0.0
          discovery.type: single-node
          http.port: 9202
          http.cors.enabled: true
          DISABLE_SECURITY_PLUGIN: true
          DISABLE_INSTALL_DEMO_CONFIG: true
          OPENSEARCH_JAVA_OPTS: -Xms512m -Xmx512m
          action.destructive_requires_name: false
        ports:
          - 9202:9202
        options: >-
          --health-cmd="curl -f http://localhost:9202/_cluster/health || exit 1"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
          --ulimit nofile=65536:65536
          --ulimit memlock=-1:-1

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    strategy:
      matrix:
        python-version: [ "3.12", "3.13", "3.14"]
        backend: [ "elasticsearch", "opensearch"]
        include:
          - backend: "elasticsearch"
            port: "9200"
          - backend: "opensearch"
            port: "9202"

    name: Python ${{ matrix.python-version }} testing with ${{ matrix.backend }}

    steps:
      - name: Check out repository code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
          cache-dependency-path: |
            **/pyproject.toml

      - name: Lint code
        if: ${{ matrix.python-version == '3.12' }}
        run: |
          python -m pip install pre-commit
          pre-commit run --all-files

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip wheel pytest-timeout
          pip install ./stac_fastapi/core
          pip install ./stac_fastapi/sfeos_helpers
          pip install ./stac_fastapi/elasticsearch[catalogs,dev,server,validator]
          pip install ./stac_fastapi/opensearch[catalogs,dev,server,validator]

      - name: Run test suite
        run: |
          pytest -svvv --timeout=300
        env:
          ENVIRONMENT: testing
          ES_PORT: ${{ matrix.port }}
          ES_HOST: 172.17.0.1
          ES_USE_SSL: false
          DATABASE_REFRESH: true
          ES_VERIFY_CERTS: false
          REDIS_ENABLE: true
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          BACKEND: ${{ matrix.backend }}