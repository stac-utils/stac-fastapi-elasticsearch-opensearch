name: Helm Chart Tests

on:
  push:
    branches: [ main, develop, feat/* ]
    paths:
      - 'helm-chart/**'
      - '.github/workflows/helm-chart-test.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'helm-chart/**'
      - '.github/workflows/helm-chart-test.yml'

env:
  HELM_VERSION: v4.0.0
  KUBECTL_VERSION: v1.34.0
  KIND_VERSION: v0.30.0

jobs:
  lint:
    name: Lint Helm Chart
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5
        with:
          version: ${{ env.HELM_VERSION }}

      - name: Setup Helm repositories
        uses: ./.github/actions/setup-helm-repos

      - name: Lint Helm chart
        run: |
          cd helm-chart/stac-fastapi
          helm dependency update
          helm lint .

  test-matrix:
    name: Test Chart
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        backend: [opensearch]
        kubernetes-version: [v1.33.1]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5
        with:
          version: ${{ env.HELM_VERSION }}

      - name: Set up kubectl
        uses: azure/setup-kubectl@829323503d1be3d00ca8346e5391ca0b07a9ab0d # v5
        with:
          version: ${{ env.KUBECTL_VERSION }}

      - name: Set up Kind
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
        with:
          version: ${{ env.KIND_VERSION }}
          node_image: kindest/node:${{ matrix.kubernetes-version }}
          cluster_name: stac-fastapi-${{ matrix.kubernetes-version }}
          config: .github/kind/multi-node.yaml

      - name: Setup Helm repositories
        uses: ./.github/actions/setup-helm-repos

      - name: Run matrix tests
        env:
          BACKEND: ${{ matrix.backend }}
          MATRIX_MODE: true
        run: |
          chmod +x ./helm-chart/test-chart.sh
          ./helm-chart/test-chart.sh -m -b ${{ matrix.backend }} ci

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: test-report-${{ matrix.backend }}-k8s-${{ matrix.kubernetes-version }}
          path: test-report-*.json

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5
        with:
          version: ${{ env.HELM_VERSION }}

      - name: Setup Helm repositories
        uses: ./.github/actions/setup-helm-repos

      - name: Run Checkov security scan
        uses: bridgecrewio/checkov-action@20fb358293b0af0188f25cf7658b69d49ec12c9a # master
        with:
          directory: helm-chart/
          framework: kubernetes
          output_format: sarif
          output_file_path: reports/results.sarif

      - name: Upload Checkov results
        if: always()
        uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4
        with:
          sarif_file: reports/results.sarif
